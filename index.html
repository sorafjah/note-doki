<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="SyncNote">
<meta name="theme-color" content="#1c1c1e">
<title>SyncNote</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #1c1c1e;
  --surface: #2c2c2e;
  --surface2: #3a3a3c;
  --border: #48484a;
  --text: #ffffff;
  --text-secondary: #ebebf5cc;
  --text-light: #8e8e93;
  --accent: #ff9f0a;
  --accent-red: #ff453a;
  --font: -apple-system, "Hiragino Kaku Gothic ProN", "BIZ UDGothic", sans-serif;
}

/* =====================================================
   修正5: レイアウト崩れ対策
   html/body に width:100% を明示、overflow-x:hidden で横スクロール防止
   position:fixed でiPhoneのビューポート変動に対応
   ===================================================== */
html {
  width: 100%;
  height: 100%;
  overflow: hidden;
}
body {
  width: 100%;
  height: 100%;
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  overflow: hidden;
  position: fixed; /* iPhoneのアドレスバー出入りでリサイズされる問題を防ぐ */
  top: 0; left: 0; right: 0; bottom: 0;
}

.app {
  display: flex;
  flex-direction: column;
  width: 100%;
  height: 100%;
  /* dvh使用。position:fixedと組み合わせてiPhone対応 */
  height: 100dvh;
  overflow: hidden;
}

/* ===== ヘッダー ===== */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  padding-top: max(12px, env(safe-area-inset-top));
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.header-title {
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--text);
}
.header-status {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 0.78rem;
  color: var(--text-light);
}
.status-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--text-light);
}
.status-dot.ok { background: #30d158; }
.status-dot.err { background: var(--accent-red); }
.header-right {
  display: flex;
  align-items: center;
  gap: 12px;
}
.icon-btn {
  background: none;
  border: none;
  color: var(--accent);
  font-size: 1.3rem;
  cursor: pointer;
  padding: 4px;
  -webkit-tap-highlight-color: transparent;
  line-height: 1;
}

/* ===== メインコンテンツ ===== */
.main {
  flex: 1;
  overflow: hidden;
  min-height: 0;
  display: flex;
  flex-direction: column;
  width: 100%; /* 修正5: 明示的に100% */
}

/* ===== ノート一覧 ===== */
.note-list {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  width: 100%;
}
.note-item {
  display: flex;
  align-items: center;
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  width: 100%; /* 修正5 */
}
.note-item:active { background: var(--surface); }
.note-item-body { flex: 1; min-width: 0; }
.note-item-title {
  font-size: 1.0625rem; /* 修正4: iPhoneメモアプリ基準 */
  font-weight: 600;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.note-item-meta {
  font-size: 0.8125rem; /* 修正4 */
  color: var(--text-light);
  margin-top: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.note-item-date {
  font-size: 0.75rem;
  color: var(--text-light);
  margin-right: 8px;
  flex-shrink: 0;
}

/* ===== エディタ画面 ===== */
.editor-screen {
  display: none;
  flex-direction: column;
  width: 100%;
  height: 100%;
}
.editor-screen.active {
  display: flex;
}

.editor-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  padding-top: max(12px, env(safe-area-inset-top));
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.editor-header-left {
  display: flex;
  align-items: center;
  gap: 8px;
}
.back-btn {
  background: none;
  border: none;
  color: var(--accent);
  font-size: 1rem;
  cursor: pointer;
  padding: 4px 8px 4px 0;
  -webkit-tap-highlight-color: transparent;
  display: flex;
  align-items: center;
  gap: 4px;
}
.editor-save-status {
  font-size: 0.78rem;
  color: #30d158;
}
.editor-save-status.saving { color: var(--text-light); }
.delete-btn {
  background: none;
  border: none;
  color: var(--accent-red);
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
  padding: 4px;
  -webkit-tap-highlight-color: transparent;
  font-family: var(--font);
}

/* =====================================================
   修正3: テキストエリア - scrollTop=0 はJS側で対応
   修正4: フォントサイズ 17px (iPhoneメモアプリ基準)
   ===================================================== */
#editor-textarea {
  flex: 1;
  border: none;
  outline: none;
  resize: none;
  padding: 16px;
  /* 修正4: iPhoneメモアプリは本文17px */
  font-size: 17px;
  line-height: 1.6;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  width: 100%; /* 修正5 */
}

/* ===== FAB ===== */
.fab {
  position: absolute;
  bottom: max(28px, env(safe-area-inset-bottom, 16px));
  right: 20px;
  width: 56px; height: 56px;
  border-radius: 50%;
  background: var(--accent);
  color: #000;
  font-size: 1.8rem;
  line-height: 1;
  border: none;
  cursor: pointer;
  box-shadow: 0 4px 16px rgba(0,0,0,0.4);
  display: flex;
  align-items: center;
  justify-content: center;
  -webkit-tap-highlight-color: transparent;
}
.list-screen {
  position: relative;
  flex: 1;
  display: flex;
  flex-direction: column;
  width: 100%;
  overflow: hidden;
}

/* ===== モーダル ===== */
.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 300;
  display: flex;
  align-items: flex-end;
  justify-content: center;
}
.modal.hidden { display: none; }
.modal-box {
  background: var(--surface);
  border-radius: 16px 16px 0 0;
  padding: 20px;
  padding-bottom: max(20px, env(safe-area-inset-bottom));
  width: 100%;
  max-width: 520px;
  box-shadow: 0 -4px 24px rgba(0,0,0,0.4);
  max-height: 80vh;
  overflow-y: auto;
}
.modal-box h2 {
  font-size: 1rem;
  font-weight: 700;
  margin-bottom: 16px;
  color: var(--text);
}
.form-group { margin-bottom: 12px; }
.form-group label {
  display: block;
  font-size: 0.75rem;
  font-weight: 700;
  color: var(--text-light);
  margin-bottom: 4px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.form-group input {
  width: 100%;
  padding: 10px 12px;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-family: var(--font);
  font-size: 0.9rem;
  background: var(--surface2);
  color: var(--text);
}
.form-group input:focus {
  outline: 2px solid var(--accent);
  border-color: transparent;
}
.form-note {
  font-size: 0.7rem;
  color: var(--text-light);
  margin-top: 3px;
}
.modal-buttons {
  display: flex;
  gap: 10px;
  margin-top: 18px;
}
.btn {
  flex: 1;
  padding: 12px;
  border: none;
  border-radius: 10px;
  font-family: var(--font);
  font-size: 0.95rem;
  font-weight: 600;
  cursor: pointer;
}
.btn-primary { background: var(--accent); color: #000; }
.btn-secondary { background: var(--surface2); color: var(--text); }

/* ===== 削除確認 ===== */
.confirm-modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 400;
  display: flex;
  align-items: center;
  justify-content: center;
}
.confirm-modal.hidden { display: none; }
.confirm-box {
  background: var(--surface);
  border-radius: 14px;
  padding: 20px;
  width: min(280px, 88vw);
  text-align: center;
}
.confirm-box h3 {
  font-size: 0.95rem;
  font-weight: 700;
  margin-bottom: 8px;
}
.confirm-box p {
  font-size: 0.8rem;
  color: var(--text-light);
  margin-bottom: 16px;
  line-height: 1.5;
}
.confirm-buttons {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.confirm-buttons button {
  padding: 12px;
  border: none;
  border-radius: 10px;
  font-family: var(--font);
  font-size: 0.95rem;
  font-weight: 600;
  cursor: pointer;
}
.btn-danger { background: var(--accent-red); color: #fff; }
.btn-cancel-white { background: var(--surface2); color: var(--text); }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <span class="header-title">SyncNote</span>
    <div class="header-status">
      <span class="status-dot" id="status-dot"></span>
      <span id="status-text"></span>
    </div>
    <div class="header-right">
      <button class="icon-btn" id="btn-reload" title="再読込">↺</button>
      <button class="icon-btn" id="btn-settings" title="設定">⚙</button>
    </div>
  </div>

  <div class="main">
    <!-- 一覧画面 -->
    <div class="list-screen" id="list-screen">
      <div class="note-list" id="note-list"></div>
      <button class="fab" id="btn-new">+</button>
    </div>

    <!-- エディタ画面 -->
    <div class="editor-screen" id="editor-screen">
      <div class="editor-header">
        <div class="editor-header-left">
          <button class="back-btn" id="btn-back">&#8249; 一覧</button>
          <span class="editor-save-status" id="editor-save-status"></span>
        </div>
        <button class="delete-btn" id="btn-delete">削除</button>
      </div>
      <textarea id="editor-textarea" placeholder="メモを入力…"></textarea>
    </div>
  </div>
</div>

<!-- GitHub設定モーダル -->
<div class="modal hidden" id="modal-github">
  <div class="modal-box">
    <h2>GitHub設定</h2>
    <div class="form-group">
      <label>GitHubユーザー名</label>
      <input type="text" id="gh-user" autocomplete="off">
    </div>
    <div class="form-group">
      <label>リポジトリ名</label>
      <input type="text" id="gh-repo" autocomplete="off">
    </div>
    <div class="form-group">
      <label>フォルダパス（任意）</label>
      <input type="text" id="gh-folder" placeholder="notes" autocomplete="off">
      <div class="form-note">空白の場合はルートに保存</div>
    </div>
    <div class="form-group">
      <label>Personal Access Token</label>
      <input type="password" id="gh-token" autocomplete="off">
      <div class="form-note">localStorageのみに保存。外部送信なし。</div>
    </div>
    <div class="modal-buttons">
      <button class="btn btn-secondary" id="modal-cancel">キャンセル</button>
      <button class="btn btn-primary" id="modal-save">保存</button>
    </div>
  </div>
</div>

<!-- 削除確認モーダル -->
<div class="confirm-modal hidden" id="confirm-modal">
  <div class="confirm-box">
    <h3>このメモを削除しますか？</h3>
    <p>GitHubからも削除されます。<br>この操作は取り消せません。</p>
    <div class="confirm-buttons">
      <button class="btn-danger" id="confirm-delete-ok">削除する</button>
      <button class="btn-cancel-white" id="confirm-delete-cancel">キャンセル</button>
    </div>
  </div>
</div>

<script>
// =====================================================
// SyncNote - メモ管理アプリ
// 修正点:
//   1. 削除をGitHubにも反映
//   2. 新規作成は空で開始
//   3. メモを開いたとき先頭を表示
//   4. フォントサイズ 17px
//   5. レイアウト崩れ対策 (CSS + resize対応)
// =====================================================

// ===== データ構造 =====
// notes: { id: { id, title, content, updatedAt } }
// GitHubには notes/<id>.txt として保存

let notes = {};          // メモ一覧 (メモリ)
let currentNoteId = null; // 編集中のノートID
let autoSaveTimer = null;
let isSaving = false;

// ===== localStorage キー =====
const LS_NOTES = 'syncnote-notes';

// ===== ユーティリティ =====
function genId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
}
function formatDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const target = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  const diff = today - target;
  if (diff === 0) {
    return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  } else {
    return `${d.getMonth()+1}月${d.getDate()}日`;
  }
}

// ===== ローカル保存 =====
function saveLocal() {
  localStorage.setItem(LS_NOTES, JSON.stringify(notes));
}
function loadLocal() {
  try {
    const raw = localStorage.getItem(LS_NOTES);
    if (raw) notes = JSON.parse(raw);
  } catch(e) { notes = {}; }
}

// ===== GitHub設定 =====
const GH_KEYS = ['gh-user', 'gh-repo', 'gh-folder', 'gh-token'];
function getGhConfig() {
  return {
    user:   localStorage.getItem('gh-user') || '',
    repo:   localStorage.getItem('gh-repo') || '',
    folder: localStorage.getItem('gh-folder') || 'notes',
    token:  localStorage.getItem('gh-token') || ''
  };
}
function isGhConfigured() {
  const c = getGhConfig();
  return c.user && c.repo && c.token;
}
function ghFilePath(id) {
  const c = getGhConfig();
  const folder = c.folder.replace(/\/$/, '');
  return folder ? `${folder}/${id}.txt` : `${id}.txt`;
}
function ghApiUrl(id) {
  const c = getGhConfig();
  return `https://api.github.com/repos/${c.user}/${c.repo}/contents/${ghFilePath(id)}`;
}
function ghHeaders() {
  const c = getGhConfig();
  return {
    'Authorization': `token ${c.token}`,
    'Accept': 'application/vnd.github.v3+json',
    'Content-Type': 'application/json'
  };
}

// ===== GitHub: ファイル一覧取得 =====
async function ghListFiles() {
  const c = getGhConfig();
  const folder = (c.folder || 'notes').replace(/\/$/, '');
  const url = `https://api.github.com/repos/${c.user}/${c.repo}/contents/${folder}`;
  const r = await fetch(url, { headers: ghHeaders() });
  if (!r.ok) return [];
  const files = await r.json();
  return files.filter(f => f.name.endsWith('.txt'));
}

// ===== GitHub: ファイル読み込み =====
async function ghReadFile(id) {
  const url = ghApiUrl(id);
  const r = await fetch(url, { headers: ghHeaders() });
  if (!r.ok) return null;
  const d = await r.json();
  const content = decodeURIComponent(escape(atob(d.content.replace(/\n/g, ''))));
  return { content, sha: d.sha };
}

// ===== GitHub: ファイル書き込み =====
async function ghWriteFile(id, text, sha) {
  const url = ghApiUrl(id);
  const body = {
    message: `Update ${id}`,
    content: btoa(unescape(encodeURIComponent(text)))
  };
  if (sha) body.sha = sha;
  const r = await fetch(url, { method: 'PUT', headers: ghHeaders(), body: JSON.stringify(body) });
  if (!r.ok) return null;
  const d = await r.json();
  return d.content?.sha || sha;
}

// =====================================================
// 修正1: GitHub: ファイル削除
// sha が必要なので事前に取得してから DELETE を呼ぶ
// =====================================================
async function ghDeleteFile(id) {
  const url = ghApiUrl(id);
  // まず sha を取得
  const r = await fetch(url, { headers: ghHeaders() });
  if (!r.ok) return true; // 存在しない場合は成功扱い
  const d = await r.json();
  const sha = d.sha;
  const res = await fetch(url, {
    method: 'DELETE',
    headers: ghHeaders(),
    body: JSON.stringify({ message: `Delete ${id}`, sha })
  });
  return res.ok;
}

// ===== ステータス表示 =====
function setStatus(msg, state = 'ok') {
  const dot = document.getElementById('status-dot');
  const txt = document.getElementById('status-text');
  txt.textContent = msg;
  dot.className = 'status-dot ' + (state === 'ok' ? 'ok' : state === 'err' ? 'err' : '');
  if (msg && state !== 'loading') {
    setTimeout(() => { txt.textContent = ''; dot.className = 'status-dot'; }, 2500);
  }
}

// ===== 一覧画面を描画 =====
function renderList() {
  const container = document.getElementById('note-list');
  container.innerHTML = '';
  const sorted = Object.values(notes).sort((a, b) => (b.updatedAt || '').localeCompare(a.updatedAt || ''));
  if (sorted.length === 0) {
    const empty = document.createElement('div');
    empty.style.cssText = 'padding:40px 16px;text-align:center;color:#8e8e93;font-size:0.9rem;';
    empty.textContent = 'メモがありません。＋ボタンで作成できます。';
    container.appendChild(empty);
    return;
  }
  sorted.forEach(note => {
    const item = document.createElement('div');
    item.className = 'note-item';
    const lines = (note.content || '').split('\n').filter(l => l.trim());
    const title = lines[0] || '無題のメモ';
    const preview = lines.slice(1).join('  ') || '追加のテキストなし';
    item.innerHTML = `
      <div class="note-item-body">
        <div class="note-item-title">${escHtml(title)}</div>
        <div class="note-item-meta">
          <span class="note-item-date">${formatDate(note.updatedAt)}</span>${escHtml(preview.slice(0, 60))}
        </div>
      </div>
    `;
    item.addEventListener('click', () => openNote(note.id));
    container.appendChild(item);
  });
}
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// =====================================================
// 修正2: 新規作成は空で開始（プレースホルダーなし）
// 修正3: openNote でテキストエリアのスクロールを先頭に
// =====================================================
function openNote(id) {
  currentNoteId = id;
  const note = notes[id];
  const ta = document.getElementById('editor-textarea');
  ta.value = note.content || '';

  // 修正3: スクロールを先頭に強制リセット
  // requestAnimationFrame で描画後に確実に 0 にセット
  ta.scrollTop = 0;
  requestAnimationFrame(() => {
    ta.scrollTop = 0;
    // カーソルも先頭に
    ta.setSelectionRange(0, 0);
  });

  document.getElementById('editor-save-status').textContent = '';
  showEditor();
}

function showEditor() {
  document.getElementById('list-screen').style.display = 'none';
  document.getElementById('editor-screen').classList.add('active');
}
function showList() {
  document.getElementById('editor-screen').classList.remove('active');
  document.getElementById('list-screen').style.display = 'flex';
  renderList();
}

// ===== 自動保存 =====
function scheduleAutoSave() {
  clearTimeout(autoSaveTimer);
  document.getElementById('editor-save-status').textContent = '編集中…';
  document.getElementById('editor-save-status').className = 'editor-save-status saving';
  autoSaveTimer = setTimeout(saveCurrentNote, 1500);
}
async function saveCurrentNote() {
  if (!currentNoteId) return;
  const ta = document.getElementById('editor-textarea');
  const content = ta.value;
  notes[currentNoteId] = notes[currentNoteId] || { id: currentNoteId };
  notes[currentNoteId].content = content;
  notes[currentNoteId].updatedAt = new Date().toISOString();
  saveLocal();

  const statusEl = document.getElementById('editor-save-status');
  if (!isGhConfigured()) {
    statusEl.textContent = '保存済み';
    statusEl.className = 'editor-save-status';
    return;
  }
  try {
    const sha = notes[currentNoteId].sha || null;
    const newSha = await ghWriteFile(currentNoteId, content, sha);
    if (newSha) {
      notes[currentNoteId].sha = newSha;
      saveLocal();
      statusEl.textContent = '保存完了';
      statusEl.className = 'editor-save-status';
    } else {
      statusEl.textContent = '保存失敗';
      statusEl.className = 'editor-save-status saving';
    }
  } catch(e) {
    statusEl.textContent = '保存失敗';
  }
}

// =====================================================
// 修正1: 削除 → ローカルとGitHubの両方から削除
// =====================================================
async function deleteCurrentNote() {
  if (!currentNoteId) return;
  const id = currentNoteId;

  // ローカルから削除
  delete notes[id];
  saveLocal();

  // 一覧に戻る
  currentNoteId = null;
  showList();

  // GitHubからも削除
  if (isGhConfigured()) {
    setStatus('削除中…', 'loading');
    try {
      const ok = await ghDeleteFile(id);
      setStatus(ok ? '削除完了' : '削除失敗', ok ? 'ok' : 'err');
    } catch(e) {
      setStatus('削除失敗', 'err');
    }
  }
}

// ===== GitHub同期: 全ファイル読み込み =====
async function syncLoad() {
  if (!isGhConfigured()) return;
  setStatus('読込中…', 'loading');
  try {
    const files = await ghListFiles();
    let loaded = 0;
    for (const file of files) {
      const id = file.name.replace('.txt', '');
      const result = await ghReadFile(id);
      if (result) {
        const existing = notes[id] || {};
        notes[id] = {
          ...existing,
          id,
          content: result.content,
          sha: result.sha,
          updatedAt: existing.updatedAt || new Date(file.name).toISOString() || new Date().toISOString()
        };
        loaded++;
      }
    }
    saveLocal();
    renderList();
    setStatus(loaded > 0 ? `${loaded}件を読込` : '同期済み', 'ok');
  } catch(e) {
    setStatus('読込失敗', 'err');
  }
}

// ===== 修正5: リサイズ対応 =====
// iPhoneでビューポートが変わったとき強制的に再描画
function fixViewport() {
  document.documentElement.style.height = window.innerHeight + 'px';
  document.body.style.height = window.innerHeight + 'px';
}

// ===== 初期化 =====
document.addEventListener('DOMContentLoaded', () => {
  // 修正5: 初期とリサイズ時にビューポート高さを固定
  fixViewport();
  window.addEventListener('resize', fixViewport);

  loadLocal();
  renderList();

  // 修正2: 新規作成は空で開始
  document.getElementById('btn-new').addEventListener('click', () => {
    const id = genId();
    notes[id] = {
      id,
      content: '',          // ← 空
      updatedAt: new Date().toISOString()
    };
    saveLocal();
    openNote(id);
    // フォーカスをセット
    setTimeout(() => document.getElementById('editor-textarea').focus(), 100);
  });

  document.getElementById('btn-back').addEventListener('click', () => {
    clearTimeout(autoSaveTimer);
    saveCurrentNote().then(() => showList());
  });

  document.getElementById('editor-textarea').addEventListener('input', scheduleAutoSave);

  // 削除ボタン → 確認モーダル表示
  document.getElementById('btn-delete').addEventListener('click', () => {
    document.getElementById('confirm-modal').classList.remove('hidden');
  });
  document.getElementById('confirm-delete-cancel').addEventListener('click', () => {
    document.getElementById('confirm-modal').classList.add('hidden');
  });
  document.getElementById('confirm-delete-ok').addEventListener('click', () => {
    document.getElementById('confirm-modal').classList.add('hidden');
    deleteCurrentNote();
  });

  // 設定
  document.getElementById('btn-settings').addEventListener('click', () => {
    GH_KEYS.forEach(k => {
      const v = localStorage.getItem(k);
      if (v) document.getElementById(k).value = v;
    });
    document.getElementById('modal-github').classList.remove('hidden');
  });
  document.getElementById('modal-cancel').addEventListener('click', () => {
    document.getElementById('modal-github').classList.add('hidden');
  });
  document.getElementById('modal-save').addEventListener('click', () => {
    GH_KEYS.forEach(k => localStorage.setItem(k, document.getElementById(k).value));
    document.getElementById('modal-github').classList.add('hidden');
    syncLoad();
  });

  document.getElementById('btn-reload').addEventListener('click', syncLoad);

  syncLoad();

  // Service Worker
  if ('serviceWorker' in navigator) {
    const sw = `
self.addEventListener('install', e => e.waitUntil(
  caches.open('syncnote-v1').then(c => c.addAll([location.href]))
));
self.addEventListener('fetch', e => e.respondWith(
  caches.match(e.request).then(r => r || fetch(e.request))
));`;
    const blob = new Blob([sw], { type: 'application/javascript' });
    navigator.serviceWorker.register(URL.createObjectURL(blob), { scope: './' }).catch(() => {});
  }
});
</script>
